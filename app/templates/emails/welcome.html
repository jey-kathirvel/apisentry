{% extends "base.html" %}

{% block title %}
Welcome to API Sentry
{% endblock %}

{% block content %}
<h1 style="margin:0 0 20px;">
    Welcome to {{ app_name }}
</h1>

<p>Hello {{ full_name }},</p>

<p>
    Your email has been verified successfully.
    Your account is ready.
</p>

<p style="margin:28px 0;">
<a
    href="{{ dashboard_url }}"
    style="
        display:inline-block;
        padding:14px 24px;
        background:#2563eb;
        color:#ffffff;
        border-radius:8px;
        text-decoration:none;
        font-weight:700;
    "
>
    Open Dashboard
</a>
</p>
{% endblock %}
