<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta
        name="viewport"
        content="width=device-width,initial-scale=1"
    >
    <title>
        {% block title %}{{ app_name }}{% endblock %}
    </title>
</head>
<body
    style="
        margin:0;
        padding:0;
        background:#f3f6fb;
        font-family:Arial,Helvetica,sans-serif;
        color:#1e293b;
    "
>
<table
    role="presentation"
    width="100%"
    cellspacing="0"
    cellpadding="0"
    border="0"
>
<tr>
<td
    align="center"
    style="padding:32px 16px;"
>
<table
    role="presentation"
    width="100%"
    cellspacing="0"
    cellpadding="0"
    border="0"
    style="
        max-width:640px;
        background:#ffffff;
        border-radius:16px;
        overflow:hidden;
    "
>
<tr>
<td
    style="
        padding:24px 32px;
        background:#172554;
        color:#ffffff;
        font-size:24px;
        font-weight:700;
    "
>
    {{ app_name }}
</td>
</tr>

<tr>
<td style="padding:36px 32px;">
    {% block content %}{% endblock %}
</td>
</tr>

<tr>
<td
    style="
        padding:22px 32px;
        background:#f8fafc;
        color:#64748b;
        font-size:12px;
        line-height:1.6;
        text-align:center;
    "
>
    Need help?
    <a
        href="mailto:{{ support_email }}"
        style="color:#2563eb;"
    >
        {{ support_email }}
    </a>
</td>
</tr>
</table>
</td>
</tr>
</table>
</body>
</html>
